<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="author" content="{{ .Site.Params.author }}">
<meta name="keywords" content="Enoch Yu, 유에녹">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Enoch Yu - Documents" />

<title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>

<link rel="icon" href="{{ .Site.Params.favicon }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="canonical" href="https://archive.enochyu.com/" />

{{ $css := resources.Match "css/*.css" | resources.Concat "css/bundle.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Enoch Yu - Documents",
  "url": "https://archive.enochyu.com/"
}
</script>
